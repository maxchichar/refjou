<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>refjou — offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #14171f;
      color: #ede8dc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }
    .card { max-width: 360px; }
    .flame { font-size: 40px; margin-bottom: 12px; }
    h1 {
      font-family: ui-serif, "Iowan Old Style", "Palatino Linotype", Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: 24px;
      margin: 0 0 8px;
    }
    p { color: #8c93a6; font-size: 14px; line-height: 1.5; margin: 0 0 20px; }
    button {
      background: #e3a857;
      color: #14171f;
      border: none;
      border-radius: 999px;
      padding: 10px 20px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="flame">🔥</div>
    <h1>You're offline</h1>
    <p>refjou needs a connection to load your feed and save reflections. Your streak is safe — just reconnect and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
